<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="color-scheme" content="dark" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova" />
  <meta name="application-name" content="Nova" />
  <meta name="format-detection" content="telephone=no" />
  <title>Nova</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #f97316;
      --primary-dark: #ea6a00;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-elevated: #222222;
      --border: #2e2e2e;
      --border-light: #252525;
      --text: #f0f0f0;
      --text-muted-color: #888;
      --text-dim: #bbb;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
    }
    /* Light theme — dark stays default (no data-theme attr). */
    html[data-theme="light"] {
      --bg: #f4f5f7;
      --bg-card: #ffffff;
      --bg-elevated: #eef0f3;
      --border: #e2e4e8;
      --border-light: #edeef1;
      --text: #1c1d21;
      --text-muted-color: #6b7280;
      --text-dim: #3a3d44;
      --text-color: #1c1d21;
      --surface-color: #ffffff;
      --shadow: 0 1px 3px rgba(16,24,40,0.08);
      --shadow-md: 0 4px 14px rgba(16,24,40,0.12);
    }
    html[data-theme="light"] #sidebar,
    html[data-theme="light"] .main-header { background: #ffffff; }
    html[data-theme="light"] tr:hover td { background: rgba(0,0,0,0.03); }
    html[data-theme="light"] .auth-logo .logo-wrap { border-color: rgba(0,0,0,0.18); }
    html[data-theme="light"] .badge-draft { background:#eceef1; color:#5b6470; }
    html[data-theme="light"] .badge-submitted { background:#fff4e0; color:#b9770b; border-color:#ffe2b0; }
    html[data-theme="light"] .badge-approved { background:#e4f7ec; color:#15803d; border-color:#bbe9cd; }
    html[data-theme="light"] .badge-rejected { background:#fdeaea; color:#dc2626; border-color:#f6c9c9; }
    html[data-theme="light"] .badge-cancelled { background:#f3eafe; color:#8b3fd6; border-color:#e0cdf7; }
    html[data-theme="light"] .badge-order-placed { background:#eef0fe; color:#5b54d6; border-color:#d4d6f7; }
    html[data-theme="light"] .badge-admin { background:#eef0fe; color:#5b54d6; }
    html[data-theme="light"] .badge-approver { background:#e7f0fe; color:#2563eb; }
    html[data-theme="light"] .badge-requester { background:#eceef1; color:#5b6470; }
    html[data-theme="light"] .badge-inactive { background:#f4f5f7; color:#9aa1ab; border-color:#e2e4e8; }
    html[data-theme="light"] .alert-error { background:#fdeaea; color:#b91c1c; border-color:#f6c9c9; }
    html[data-theme="light"] .alert-success { background:#e4f7ec; color:#15803d; border-color:#bbe9cd; }
    html[data-theme="light"] .alert-info { background:#e7f0fe; color:#1d4ed8; border-color:#cfe0fb; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { display: flex; min-height: 100vh; width: 100%; }
    #sidebar { width: 240px; background: #111; border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; height: 100dvh; z-index: 100; transition: transform 0.25s ease; }
    #main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .main-header { background: #111; border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .main-content { padding: 24px; flex: 1; }
    #app.no-sidebar #sidebar { display: none; }
    #app.no-sidebar #main { margin-left: 0; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--text); flex-shrink: 0; }
    .hamburger svg { display: block; }
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
    @media (max-width: 768px) {
      /* iOS Safari auto-zooms when focusing an input under 16px; keep form controls at 16px on phones to stop the zoom-on-open. */
      input, select, textarea { font-size: 16px; }
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #main { margin-left: 0; }
      .hamburger { display: flex; }
      .main-content { padding: 16px; }
      .page-header { flex-wrap: wrap; gap: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-wrap table { min-width: 620px; }
      .line-items-table { table-layout: auto !important; min-width: 620px; }
    }
    .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h1 { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .sidebar-logo h1::after { content: ''; display: block; width: 32px; height: 2px; background: var(--primary); margin-top: 6px; border-radius: 2px; }
    .sidebar-logo p { font-size: 12px; color: var(--text-muted-color); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-dim); font-size: 14px; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--bg-elevated); color: var(--text); }
    .nav-item.active { background: rgba(249,115,22,0.15); color: var(--primary); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-section-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:var(--radius); cursor:pointer; color:var(--text-dim); font-size:14px; font-weight:500; transition:all 0.15s; user-select:none; margin-bottom:2px; }
    .nav-section-header:hover { background:var(--bg-elevated); color:var(--text); }
    .nav-section-header.open { background:var(--bg-elevated); color:var(--text); }
    .nav-section-header.section-active { color:var(--primary); }
    .nav-section-header .s-label { display:flex; align-items:center; gap:10px; pointer-events:none; }
    .nav-section-header .s-label svg { width:18px; height:18px; flex-shrink:0; }
    .nav-chevron { opacity:0.4; transition:transform 0.2s ease; flex-shrink:0; pointer-events:none; }
    .nav-section-header.open .nav-chevron { transform:rotate(90deg); opacity:0.7; }
    .nav-sub { display:flex; align-items:center; gap:8px; padding:7px 12px 7px 36px; border-radius:var(--radius); cursor:pointer; color:var(--text-muted-color); font-size:13px; transition:all 0.15s; margin-bottom:1px; }
    .nav-sub:hover { background:var(--bg-elevated); color:var(--text); }
    .nav-sub.active { background:rgba(249,115,22,0.12); color:var(--primary); font-weight:600; }
    .nav-sub svg { width:14px; height:14px; flex-shrink:0; }
    .sidebar-footer { padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user-role { font-size: 12px; color: var(--text-muted-color); text-transform: capitalize; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-secondary { background: var(--bg-elevated); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #2a2a2a; color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 13px; }
    .btn-ghost { background: transparent; color: var(--text-muted-color); }
    .btn-ghost:hover { background: var(--bg-elevated); color: var(--text-dim); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .card-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; color: var(--text); background: var(--bg-elevated); transition: border 0.15s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active, textarea:-webkit-autofill, select:-webkit-autofill { -webkit-text-fill-color: var(--text); -webkit-box-shadow: 0 0 0 1000px var(--bg-elevated) inset; box-shadow: 0 0 0 1000px var(--bg-elevated) inset; caret-color: var(--text); transition: background-color 99999s ease-in-out 0s; }
    select option { background: var(--bg-elevated); color: var(--text); }
    textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted-color); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--bg-elevated); }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border-light); color: var(--text-dim); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
    .badge-draft { background: #2a2a2a; color: #aaa; }
    .badge-submitted { background: #2d2100; color: #f59e0b; border: 1px solid #4a3500; }
    .badge-approved { background: #0d2d17; color: #22c55e; border: 1px solid #134d27; }
    .badge-rejected { background: #2d0d0d; color: #ef4444; border: 1px solid #4d1515; }
    .badge-cancelled { background: #1a0d2e; color: #c084fc; border: 1px solid #3b1f6e; }
    .badge-order-placed { background: #1a0d2e; color: #a78bfa; border: 1px solid #3b1f6e; }
    .badge-admin { background: #1e1040; color: #a78bfa; }
    .badge-approver { background: #0d1e30; color: #60a5fa; }
    .badge-requester { background: #2a2a2a; color: #aaa; }
    .badge-inactive { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
    .user-row-inactive td { opacity: 0.5; }
    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: 22px; font-weight: 700; }
    .page-subtitle { font-size: 14px; color: var(--text-muted-color); margin-top: 4px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
    .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: var(--primary); }
    .stat-label { font-size: 13px; color: var(--text-muted-color); }
    .line-items-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .line-items-table th { padding: 8px 10px; background: var(--bg-elevated); font-size: 12px; font-weight: 600; color: var(--text-muted-color); text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; }
    .line-items-table td { padding: 8px 10px; font-size: 14px; border-bottom: 1px solid var(--border-light); color: var(--text-dim); }
    .line-items-table td input { padding: 6px 8px; }
    .line-items-table td .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .line-items-table .total-row td { font-weight: 700; background: var(--bg-elevated); color: var(--primary); }
    .add-item-btn { margin-top: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .detail-field label { font-size: 12px; font-weight: 600; color: var(--text-muted-color); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .detail-field p { font-size: 15px; color: var(--text); }
    .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; }
    .alert-error { background: #2d0d0d; color: #fca5a5; border: 1px solid #4d1515; }
    .alert-success { background: #0d2d17; color: #86efac; border: 1px solid #134d27; }
    .alert-info { background: #0d1e30; color: #93c5fd; border: 1px solid #1e3a5f; }
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); width: 100%; }
    .auth-card { width: 100%; max-width: 400px; padding: 8px; margin: 0 auto; text-align: center; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-wrap { border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 8px 18px; display: inline-block; margin-bottom: 12px; }
    .auth-logo img { display: block; height: 72px; object-fit: contain; }
    .auth-logo h2 { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .auth-logo p { color: var(--text-muted-color); font-size: 14px; }
    .row-actions { display: flex; gap: 8px; flex-wrap: nowrap; align-items: center; }
    .row-actions .btn { white-space: nowrap; flex-shrink: 0; }
    @media (max-width: 560px) { .row-actions { flex-wrap: wrap; } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 480px; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .doc-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(249,115,22,0.15); color: var(--primary); padding: 2px 6px; border-radius: 4px; }
    .doc-act { padding: 4px 7px !important; font-size: 15px !important; line-height: 1; }
    @media (max-width: 640px) { .doc-hide-sm { display: none !important; } }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 140px; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted-color); }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
    .loading { text-align: center; padding: 48px; color: var(--text-muted-color); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(249,115,22,0.25); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
    .spinner-lg { width:36px; height:36px; border-width:3px; }
    .task-dragging { outline:2px solid var(--primary); outline-offset:-2px; }
    .sched-drop-hot { outline:2px dashed var(--primary,#f97316); outline-offset:-2px; background:rgba(249,115,22,0.10) !important; }
    .doc-drop-hot { outline:2px dashed var(--primary,#f97316); outline-offset:-3px; background:rgba(249,115,22,0.08); }
    .flex-gap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .text-right { text-align: right; }
    .text-muted { color: var(--text-muted-color); font-size: 13px; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .hidden { display: none !important; }
    /* ===== PWA / mobile optimization ===== */
    html { -webkit-text-size-adjust: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    .main-header { padding-top: calc(16px + env(safe-area-inset-top)); padding-left: calc(24px + env(safe-area-inset-left)); padding-right: calc(24px + env(safe-area-inset-right)); }
    #sidebar { padding-bottom: env(safe-area-inset-bottom); }
    @media (display-mode: standalone) { .main-header { position: sticky; top: 0; z-index: 50; } }
    @media (max-width: 768px) {
      input, select, textarea { font-size: 16px; }
      .btn { min-height: 44px; padding: 11px 16px; }
      .nav-item, .nav-sub, .nav-section-header { min-height: 44px; }
      .hamburger { min-width: 44px; min-height: 44px; align-items: center; justify-content: center; }
      .main-content { padding: 16px calc(16px + env(safe-area-inset-left)) calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-right)); }
      td, th { white-space: nowrap; }
    }
  </style>
  <script>(function(){try{if(localStorage.getItem("po_theme")==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}})();</script>
</head>
<body>
<canvas id="ai-canvas-left" style="position:fixed;top:0;left:0;pointer-events:none;z-index:0"></canvas>
<div id="app" class="no-sidebar"></div>
<script src="/js/app.js"></script>
<style>
.ai-msg { display:flex; }
.ai-msg-user { justify-content:flex-end; }
.ai-msg-bot { justify-content:flex-start; }
.ai-msg-user .ai-msg-bubble {
  background:var(--primary);
  color:#fff;
  border-bottom-right-radius:4px;
}
.ai-msg-bubble {
  max-width:80%;
  padding:10px 14px;
  border-radius:14px;
  font-size:15px;
  line-height:1.5;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;
}
.ai-msg-bot .ai-msg-bubble {
  background:var(--bg-elevated);
  color:var(--text);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.ai-msg-bubble img { max-width:100%; height:auto; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function (err) {
      console.warn('SW registration failed:', err);
    });
  });
}

// ---- Install ('Add to app') prompt -------------------------------------
(function () {
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  if (isStandalone()) return;
  try { if (localStorage.getItem('nova_install_dismissed') === '1') return; } catch (e) {}
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  function dismiss() {
    var el = document.getElementById('nova-install-banner');
    if (el) el.parentNode.removeChild(el);
    try { localStorage.setItem('nova_install_dismissed', '1'); } catch (e) {}
  }
  window.__novaInstallDismiss = dismiss;
  function banner(inner) {
    if (document.getElementById('nova-install-banner')) return null;
    var b = document.createElement('div');
    b.id = 'nova-install-banner';
    b.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom));z-index:9999;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:12px 14px;display:flex;align-items:center;gap:12px;width:360px;max-width:calc(100vw - 24px);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#f0f0f0';
    b.innerHTML = inner;
    document.body.appendChild(b);
    return b;
  }
  var logo = '<div style="flex-shrink:0;width:36px;height:36px;border-radius:8px;background:#0f0f0f;display:flex;align-items:center;justify-content:center;color:#f97316;font-weight:800;font-size:18px">N</div>';
  var closeBtn = '<button onclick="window.__novaInstallDismiss()" aria-label="Dismiss" style="background:none;border:none;color:#888;font-size:22px;line-height:1;cursor:pointer;flex-shrink:0;padding:0 2px">&times;</button>';
  if (isIOS) {
    setTimeout(function () {
      banner(logo +
        '<div style="flex:1;font-size:13px;line-height:1.4">Install Nova: tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.</div>' +
        closeBtn);
    }, 1200);
    return;
  }
  var deferred = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    var b = banner(logo +
      '<div style="flex:1;font-size:13px;line-height:1.4"><strong>Install Nova</strong><br><span style="color:#888">Add it to your device for quick access.</span></div>' +
      '<button id="nova-install-go" style="background:#f97316;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0">Install</button>' +
      closeBtn);
    if (!b) return;
    var go = document.getElementById('nova-install-go');
    if (go) go.addEventListener('click', function () {
      var el = document.getElementById('nova-install-banner');
      if (el) el.parentNode.removeChild(el);
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.then(function () { deferred = null; });
    });
  });
  window.addEventListener('appinstalled', function () {
    var el = document.getElementById('nova-install-banner');
    if (el) el.parentNode.removeChild(el);
    try { localStorage.setItem('nova_install_dismissed', '1'); } catch (e) {}
  });
})();
</script>
</body>
</html>
