<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send to Nova</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root { --pal: #f97316; --bg: #0f0f0f; --panel: #1a1a1a; --line: #2a2a2a; --text: #f5f5f5; --muted: #9a9a9a; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    .wrap { padding: 14px; }
    h1 { font-size: 16px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pal); display: inline-block; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    input, select, textarea {
      width: 100%; background: var(--panel); border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 72px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--pal); }
    button {
      width: 100%; background: var(--pal); color: #111; border: none; border-radius: 8px;
      padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px;
    }
    button.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--line); }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .msg { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.err { background: #2a1414; color: #fca5a5; display: block; }
    .msg.ok { background: #13241a; color: #86efac; display: block; }
    .hide { display: none; }
    .muted { color: var(--muted); font-size: 12px; }
    .fyi-box {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      max-height: 132px; overflow-y: auto; padding: 4px 2px;
    }
    .fyi-box label {
      display: flex; align-items: center; gap: 8px; margin: 0; padding: 6px 8px;
      font-size: 14px; color: var(--text); cursor: pointer; border-radius: 6px;
    }
    .fyi-box label:hover { background: #222; }
    .fyi-box input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--pal); }
    .fyi-empty { padding: 8px; text-align: center; }
    .done { text-align: center; padding: 20px 8px; }
    .done .check {
      width: 54px; height: 54px; border-radius: 50%; background: #13241a;
      color: #86efac; font-size: 30px; line-height: 54px; margin: 0 auto 12px;
    }
    .done h2 { font-size: 18px; margin: 0 0 6px; }
    .done p { color: var(--muted); font-size: 13px; margin: 0 0 4px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span> Send to Nova</h1>

  <!-- Login -->
  <div id="login">
    <p class="muted">Sign in to Nova to create tasks.</p>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username" />
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" />
    <div id="codeBox" class="hide">
      <label>Verification code (sent to you)</label>
      <input id="code" inputmode="numeric" />
    </div>
    <button id="loginBtn">Sign in</button>
  </div>

  <!-- Task form -->
  <div id="form" class="hide">
    <p class="muted" id="who"></p>
    <label>Title</label>
    <input id="title" />
    <label>Description</label>
    <textarea id="description"></textarea>
    <div class="row">
      <div>
        <label>Priority</label>
        <select id="priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
      <div>
        <label>Due date</label>
        <input id="due" type="date" />
      </div>
    </div>
    <label>Assign to</label>
    <select id="assignee"></select>
    <label>FYI <span class="muted">(optional — emailed for awareness, no task)</span></label>
    <div id="fyiBox" class="fyi-box"><div class="fyi-empty muted">Loading people…</div></div>
    <button id="regenBtn" class="secondary">Re-read email with AI</button>
    <button id="createBtn">Create task</button>
  </div>

  <!-- Success -->
  <div id="done" class="hide">
    <div class="done">
      <div class="check">&#10003;</div>
      <h2>Task created</h2>
      <p id="doneAssignee"></p>
      <p id="doneFyi"></p>
    </div>
    <button id="anotherBtn">Create another task</button>
  </div>

  <div id="msg" class="msg"></div>
</div>

<script>
  var TOKEN = '';
  var emailCtx = { subject: '', body: '' };

  function setMsg(text, kind) {
    var el = document.getElementById('msg');
    el.textContent = text || '';
    el.className = 'msg' + (kind ? ' ' + kind : '');
    if (!text) el.style.display = 'none';
  }

  function api(path, method, body) {
    var headers = { 'Content-Type': 'application/json' };
    if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
    return fetch(path, { method: method || 'GET', headers: headers, body: body ? JSON.stringify(body) : undefined })
      .then(function (res) {
        var nt = res.headers.get('X-New-Token');
        if (nt) { TOKEN = nt; saveToken(); }
        return res.json().then(function (data) {
          if (!res.ok) throw new Error((data && data.error) || ('Error ' + res.status));
          return data;
        });
      });
  }

  Office.onReady(function () {
    loadToken().then(function (t) {
      TOKEN = t || '';
      var item = Office.context.mailbox.item;
      emailCtx.subject = (item && item.subject) || '';
      var ready = function () {
        if (TOKEN) { showForm(); }
        else { attemptSso(); }  // no stored token -> passwordless sign-in, then password fallback
      };
      if (item && item.body) {
        item.body.getAsync('text', function (r) {
          emailCtx.body = (r && r.status === 'succeeded') ? (r.value || '') : '';
          ready();
        });
      } else { ready(); }
    });
  });

  // ---- Office SSO (passwordless) ----
  // Ask Outlook for a Microsoft token for the signed-in account and trade it for
  // a Nova add-in token. New Outlook wipes all client storage between launches,
  // so this is how the pane re-authenticates silently instead of re-prompting.
  function ssoExchange(ssoToken) {
    return fetch('/api/addin/sso', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + ssoToken, 'Content-Type': 'application/json' }
    }).then(function (res) {
      return res.json().then(function (d) {
        if (!res.ok) throw new Error((d && d.error) || ('Error ' + res.status));
        return d;
      });
    });
  }

  function attemptSso() {
    if (!(window.Office && Office.auth && Office.auth.getAccessToken)) return; // password form already visible
    setMsg('Signing you in...', '');
    Office.auth.getAccessToken({ allowSignInPrompt: true, allowConsentPrompt: true })
      .then(function (ssoToken) { return ssoExchange(ssoToken); })
      .then(function (d) {
        if (d && d.token) { TOKEN = d.token; saveToken(); showForm(); }
        else { setMsg('', ''); }
      })
      .catch(function (e) {
        // Office SSO errors (13xxx) or no matching Nova account: fall back to the
        // password form. Only surface a message for the account-mismatch case.
        var msg = (e && /Nova account/.test(e.message || '')) ? e.message : '';
        setMsg(msg, msg ? 'err' : '');
      });
  }

  // ---- Login ----
  document.getElementById('loginBtn').addEventListener('click', function () {
    var codeBox = document.getElementById('codeBox');
    if (!codeBox.classList.contains('hide')) return verify();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    if (!email || !password) return setMsg('Enter your email and password.', 'err');
    setMsg('Signing in...', '');
    api('/api/auth/login', 'POST', { email: email, password: password })
      .then(function (data) {
        if (data.token) { TOKEN = data.token; saveToken(); return exchangeForAddinToken().then(showForm); }
        if (data.requires2fa) {
          window._pendingUser = data.userId;
          codeBox.classList.remove('hide');
          document.getElementById('loginBtn').textContent = 'Verify code';
          setMsg('Code sent via ' + (data.via || 'email') + '. Enter it above.', 'ok');
        }
      })
      .catch(function (e) { setMsg(e.message, 'err'); });
  });

  function verify() {
    var code = document.getElementById('code').value.trim();
    if (!code) return setMsg('Enter the verification code.', 'err');
    setMsg('Verifying...', '');
    api('/api/auth/verify-2fa', 'POST', { userId: window._pendingUser, code: code, rememberDevice: true })
      .then(function (data) { TOKEN = data.token; saveToken(); exchangeForAddinToken().then(showForm); })
      .catch(function (e) { setMsg(e.message, 'err'); });
  }

  // Persist the Nova token in Office roamingSettings, which survives add-in
  // restarts - unlike localStorage, which Outlook routinely clears in the
  // add-in sandbox (the reason the old build asked you to sign in every time).
  function saveToken() {
    // Write to every store we can. OfficeRuntime.storage is the one that
    // actually persists in NEW Outlook; roamingSettings and localStorage are
    // cleared there, which is why the pane kept asking you to sign in.
    try { localStorage.setItem('nova_addin_token', TOKEN); } catch (e) {}
    try {
      var rs = Office.context && Office.context.roamingSettings;
      if (rs) { rs.set('nova_addin_token', TOKEN); rs.saveAsync(function () {}); }
    } catch (e) {}
    try {
      if (window.OfficeRuntime && OfficeRuntime.storage) {
        OfficeRuntime.storage.setItem('nova_addin_token', TOKEN);
      }
    } catch (e) {}
  }
  // Async: OfficeRuntime.storage.getItem returns a promise. Resolves to the
  // saved token, falling back to roamingSettings/localStorage, or '' if none.
  function loadToken() {
    return new Promise(function (resolve) {
      try {
        if (window.OfficeRuntime && OfficeRuntime.storage) {
          OfficeRuntime.storage.getItem('nova_addin_token').then(function (t) {
            resolve(t || loadTokenFallback());
          }).catch(function () { resolve(loadTokenFallback()); });
          return;
        }
      } catch (e) {}
      resolve(loadTokenFallback());
    });
  }
  function loadTokenFallback() {
    try {
      var rs = Office.context && Office.context.roamingSettings;
      var t = rs && rs.get('nova_addin_token');
      if (t) return t;
    } catch (e) {}
    try { return localStorage.getItem('nova_addin_token') || ''; } catch (e) { return ''; }
  }
  // Trade the just-issued session token for a long-lived (90d) add-in token so
  // the user signs in only once. Falls back to the session token on failure.
  function exchangeForAddinToken() {
    return api('/api/addin/token', 'POST')
      .then(function (d) { if (d && d.token) { TOKEN = d.token; saveToken(); } })
      .catch(function () {});
  }

  // ---- Form ----
  function showForm() {
    document.getElementById('login').classList.add('hide');
    document.getElementById('form').classList.remove('hide');
    setMsg('', '');
    loadUsers().then(generate);
  }

  function loadUsers() {
    return api('/api/addin/users', 'GET').then(function (users) {
      var sel = document.getElementById('assignee');
      sel.innerHTML = '<option value="">(default: me)</option>';
      var box = document.getElementById('fyiBox');
      box.innerHTML = '';
      users.forEach(function (u) {
        var o = document.createElement('option');
        o.value = u.id; o.textContent = u.name;
        sel.appendChild(o);

        var lab = document.createElement('label');
        var cb = document.createElement('input');
        cb.type = 'checkbox'; cb.className = 'fyi-cb'; cb.value = u.id;
        var span = document.createElement('span');
        span.textContent = u.name;
        lab.appendChild(cb); lab.appendChild(span);
        box.appendChild(lab);
      });
      if (!users.length) box.innerHTML = '<div class="fyi-empty muted">No people found.</div>';
    }).catch(function () {});
  }

  function selectedFyi() {
    var ids = [];
    var boxes = document.querySelectorAll('.fyi-cb:checked');
    for (var i = 0; i < boxes.length; i++) ids.push(boxes[i].value);
    return ids;
  }

  function generate() {
    setMsg('Reading the email with AI...', '');
    document.getElementById('regenBtn').disabled = true;
    api('/api/addin/parse', 'POST', { subject: emailCtx.subject, body: emailCtx.body })
      .then(function (d) {
        document.getElementById('title').value = d.title || emailCtx.subject || '';
        document.getElementById('description').value = d.description || '';
        document.getElementById('priority').value = d.priority || 'medium';
        document.getElementById('due').value = d.due_date || '';
        if (d.assignee_id) document.getElementById('assignee').value = String(d.assignee_id);
        document.getElementById('who').textContent = d.assignee_name ? ('Suggested assignee: ' + d.assignee_name) : '';
        setMsg('', '');
      })
      .catch(function (e) { setMsg(e.message, 'err'); })
      .then(function () { document.getElementById('regenBtn').disabled = false; });
  }

  document.getElementById('regenBtn').addEventListener('click', generate);

  document.getElementById('createBtn').addEventListener('click', function () {
    var payload = {
      title: document.getElementById('title').value.trim(),
      description: document.getElementById('description').value.trim(),
      priority: document.getElementById('priority').value,
      due_date: document.getElementById('due').value || null,
      assignee_id: document.getElementById('assignee').value || null,
      cc: selectedFyi()
    };
    if (!payload.title) return setMsg('Title is required.', 'err');
    setMsg('Creating task...', '');
    document.getElementById('createBtn').disabled = true;
    api('/api/addin/create', 'POST', payload)
      .then(function (d) { showDone(d); })
      .catch(function (e) { setMsg(e.message, 'err'); document.getElementById('createBtn').disabled = false; });
  });

  function showDone(d) {
    setMsg('', '');
    document.getElementById('createBtn').disabled = false;
    document.getElementById('form').classList.add('hide');
    document.getElementById('doneAssignee').textContent =
      'Task #' + d.id + ' assigned to ' + (d.assignee_name || 'you') + '.';
    var fyi = document.getElementById('doneFyi');
    if (d.cc_names && d.cc_names.length) {
      fyi.textContent = 'FYI emailed to: ' + d.cc_names.join(', ') + '.';
      fyi.style.display = 'block';
    } else {
      fyi.style.display = 'none';
    }
    document.getElementById('done').classList.remove('hide');
    window.scrollTo(0, 0);
  }

  document.getElementById('anotherBtn').addEventListener('click', function () {
    document.getElementById('done').classList.add('hide');
    document.getElementById('form').classList.remove('hide');
    var boxes = document.querySelectorAll('.fyi-cb:checked');
    for (var i = 0; i < boxes.length; i++) boxes[i].checked = false;
    setMsg('', '');
    generate();
  });
</script>
</body>
</html>
